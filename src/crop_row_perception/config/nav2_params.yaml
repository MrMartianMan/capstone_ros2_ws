controller_server:
  ros__parameters:
    use_sim_time: false
    controller_frequency: 10.0

    odom_topic: /odom
    controller_plugins: ["FollowPath"]
    goal_checker_plugins: ["goal_checker"]
    progress_checker_plugins: ["progress_checker"]

    FollowPath:
      plugin: "nav2_regulated_pure_pursuit_controller::RegulatedPurePursuitController"
      desired_linear_vel: 0.08
      lookahead_dist: 0.45
      min_lookahead_dist: 0.30
      max_lookahead_dist: 0.70
      use_velocity_scaled_lookahead_dist: false
      rotate_to_heading_angular_vel: 0.60
      transform_tolerance: 0.2
      use_interpolation: true
      allow_reversing: false

    goal_checker:
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 0.10
      yaw_goal_tolerance: 0.35
      stateful: true

    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.001
      movement_time_allowance: 100000.0

local_costmap:
  local_costmap:
    ros__parameters:
      use_sim_time: false
      global_frame: zed_left_camera_frame
      robot_base_frame: zed_left_camera_frame
      rolling_window: true
      width: 4
      height: 4
      resolution: 0.05
      robot_radius: 0.20
      plugins: ["inflation_layer"]

      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        inflation_radius: 0.30
        cost_scaling_factor: 3.0

lifecycle_manager_navigation:
  ros__parameters:
    use_sim_time: false
    autostart: true
    node_names:
      - controller_server
